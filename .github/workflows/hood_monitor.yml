name: HOOD Monitor

on:
  schedule:
    # ── Normal 모드 (장중 매시간) ──
    # NYSE 개장: 09:30~16:00 ET = 22:30~05:00 KST (다음날)
    # UTC 기준: 14:00~21:00
    - cron: '0 14-20 * * 1-5'   # 매시 정각 (월~금, UTC 14~20시)
    # 추가 (KST 09:00~18:00 = UTC 00:00~09:00)
    - cron: "0 0-9 * * 1-5"
    
    # ── Close 모드 (장 마감 후) ──
    # NYSE 마감 16:00 ET = 05:00 KST = 21:00 UTC
    # 30분 여유 → 21:30 UTC
    - cron: '30 21 * * 1-5'     # 월~금 장 마감 후
    
    # ── Morning 모드 (종가 기준 알림, 해당시에만) ──
    # 08:00 KST = 23:00 UTC (전날)
    - cron: '0 23 * * 1-5'      # 월~금 08:00 KST
    
    # ── 13F 모드 (주 1회 토요일) ──
    - cron: '0 10 * * 6'        # 토요일 10:00 UTC = 19:00 KST
    
    # ── Weekly 브리핑 (매주 월요일 아침) ──
    - cron: '0 23 * * 0'        # 일요일 23:00 UTC = 월요일 08:00 KST

  workflow_dispatch:
    inputs:
      mode:
        description: '실행 모드'
        required: true
        default: 'normal'
        type: choice
        options:
          - normal
          - close
          - morning
          - 13f
          - weekly
          - dca_status
          - dca_update        # ← 추가
      dca_shares:
        description: '[dca_update 전용] 매수 수량 (예: 10.5)'
        required: false
        default: ''
      dca_price:
        description: '[dca_update 전용] 매수 가격 (예: 64.50)'
        required: false
        default: ''
      
permissions:
  contents: write  # state.json 커밋용

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            MIN=$(date -u +%M)
            DOW=$(date -u +%u)  # 1=Mon ... 7=Sun
            
            # 일요일 23:00 UTC → Weekly (= 월요일 08:00 KST)
            if [ "$DOW" == "7" ] && [ "$HOUR" == "23" ]; then
              echo "mode=weekly" >> $GITHUB_OUTPUT
            # 토요일 → 13F
            elif [ "$DOW" == "6" ]; then
              echo "mode=13f" >> $GITHUB_OUTPUT
            # 평일 21:30 UTC → Close
            elif [ "$HOUR" == "21" ] && [ "$MIN" -ge "25" ]; then
              echo "mode=close" >> $GITHUB_OUTPUT
            # 평일 23:00 UTC → Morning (= 08:00 KST, 종가 기준 알림)
            elif [ "$HOUR" == "23" ]; then
              echo "mode=morning" >> $GITHUB_OUTPUT
            # 그 외 평일 → Normal
            else
              echo "mode=normal" >> $GITHUB_OUTPUT
            fi
          fi
          echo "Selected mode: $(cat $GITHUB_OUTPUT | grep mode | cut -d= -f2)"

      - name: Run HOOD Monitor
        env:
          RUN_MODE: ${{ steps.mode.outputs.mode }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DCA_SHARES: ${{ github.event.inputs.dca_shares }}   # ← 추가
          DCA_PRICE: ${{ github.event.inputs.dca_price }}     # ← 추가
        run: python hood_monitor.py

      - name: Commit state
        run: |
          git config user.name "hood-monitor[bot]"
          git config user.email "bot@hood-monitor"
          git add state.json weekly_state.json beta_cache.json app_rank_cache.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "📊 state update [${{ steps.mode.outputs.mode }}] $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase origin main || true
          git push || echo "Push failed — state will be updated next run"
