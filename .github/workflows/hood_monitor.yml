name: HOOD Monitor

on:
  schedule:
    # ── 장중 normal (프리+정규+애프터) ──────────────────────
    # UTC 08~19 = KST 17~04 중 NYSE 관련 시간대
    # PRE:     UTC 08:00~13:30 (KST 17:00~22:30)
    # REGULAR: UTC 13:30~20:00 (KST 22:30~05:00)
    # POST:    UTC 20:00~24:00 (KST 05:00~09:00)
    - cron: '0 8-19 * * 2-6'    # UTC 08~19 매시 (월~금 KST 화~토)
    - cron: '0 20-23 * * 1-5'   # UTC 20~23 매시 (일~목 KST 월~금) POST 구간

    # ── close: KST 06:00 = UTC 21:00 ────────────────────────
    # NYSE 마감(UTC 20:00) 1시간 후, 확정 종가 기준
    # 겨울(EST): NYSE 마감 UTC 21:00 → close는 UTC 22:00으로 수동 조정 필요
    - cron: '0 21 * * 1-5'      # UTC 21:00 = KST 06:00

    # ── morning: KST 06:30 = UTC 21:30 ──────────────────────
    - cron: '30 21 * * 1-5'     # UTC 21:30 = KST 06:30

    # ── weekly: 월요일 KST 08:00 = UTC 23:00 (일요일) ────────
    - cron: '0 23 * * 0'        # UTC 일요일 23:00 = KST 월요일 08:00

    # ── 13F: 토요일 KST 19:00 = UTC 10:00 ───────────────────
    - cron: '0 10 * * 6'        # UTC 토요일 10:00 = KST 19:00

  workflow_dispatch:
    inputs:
      mode:
        description: 'RUN_MODE (normal/close/morning/weekly/13f/dca_status/dca_update)'
        required: true
        default: 'normal'
      dca_shares:
        description: 'DCA_SHARES (dca_update 전용)'
        required: false
      dca_price:
        description: 'DCA_PRICE (dca_update 전용)'
        required: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Determine RUN_MODE
        id: mode
        run: |
          # workflow_dispatch이면 입력값 우선
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
            exit 0
          fi

          # schedule이면 UTC 시간 기준으로 자동 판별
          HOUR=$(date -u +%H)
          MINUTE=$(date -u +%M)
          DOW=$(date -u +%u)   # 1=월 ... 7=일
          HM=$((HOUR * 60 + MINUTE))

          if [ "$HOUR" = "21" ] && [ "$MINUTE" = "00" ]; then
            echo "mode=close" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "21" ] && [ "$MINUTE" = "30" ]; then
            echo "mode=morning" >> $GITHUB_OUTPUT
          elif [ "$DOW" = "7" ] && [ "$HOUR" = "23" ]; then
            echo "mode=weekly" >> $GITHUB_OUTPUT
          elif [ "$DOW" = "6" ] && [ "$HOUR" = "10" ]; then
            echo "mode=13f" >> $GITHUB_OUTPUT
          else
            echo "mode=normal" >> $GITHUB_OUTPUT
          fi

      - name: Run HOOD Monitor
        env:
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          RUN_MODE:           ${{ steps.mode.outputs.mode }}
          DCA_SHARES:         ${{ github.event.inputs.dca_shares }}
          DCA_PRICE:          ${{ github.event.inputs.dca_price }}
        run: python hood_monitor.py

      - name: Commit state files
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f state.json weekly_state.json beta_cache.json app_rank_cache.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update state [skip ci]"
          git push || true
