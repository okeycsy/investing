name: HOOD Monitor
on:
  schedule:
    # ── Normal (장중 매시간) ──
    - cron: '0 14-20 * * 1-5'   # NYSE 장중 UTC 14~20
    - cron: '0 0-9 * * 1-5'     # KST 낮 09:00~18:00

    # ── Close (06:00 KST) ──
    - cron: '0 21 * * 1-5'

    # ── Morning (06:30 KST, 4%+ 급변동 시에만 알림) ──
    - cron: '30 21 * * 1-5'

    # ── 13F (토요일 19:00 KST) ──
    - cron: '0 10 * * 6'

    # ── Weekly (월요일 08:00 KST) ──
    - cron: '0 23 * * 0'

  workflow_dispatch:
    inputs:
      mode:
        description: '실행 모드'
        required: true
        default: 'normal'
        type: choice
        options:
          - normal
          - close
          - morning
          - 13f
          - weekly
          - dca_status
          - dca_update        # ← 추가
      dca_shares:
        description: '[dca_update 전용] 매수 수량 (예: 10.5)'
        required: false
        default: ''
      dca_price:
        description: '[dca_update 전용] 매수 가격 (예: 64.50)'
        required: false
        default: ''
      
permissions:
  contents: write  # state.json 커밋용

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            MIN=$(date -u +%M)
            DOW=$(date -u +%u)  # 1=Mon ... 7=Sun
            
            # 일요일 23:00 UTC → Weekly (= 월요일 08:00 KST)
            if [ "$DOW" == "7" ] && [ "$HOUR" == "23" ]; then
              echo "mode=weekly" >> $GITHUB_OUTPUT
            # 토요일 → 13F
            elif [ "$DOW" == "6" ]; then
              echo "mode=13f" >> $GITHUB_OUTPUT
            # 평일 21:30 UTC → Close
            elif [ "$HOUR" == "21" ] && [ "$MIN" -ge "25" ]; then
              echo "mode=close" >> $GITHUB_OUTPUT
            # 평일 23:00 UTC → Morning (= 08:00 KST, 종가 기준 알림)
            elif [ "$HOUR" == "23" ]; then
              echo "mode=morning" >> $GITHUB_OUTPUT
            # 그 외 평일 → Normal
            else
              echo "mode=normal" >> $GITHUB_OUTPUT
            fi
          fi
          echo "Selected mode: $(cat $GITHUB_OUTPUT | grep mode | cut -d= -f2)"

      - name: Run HOOD Monitor
        env:
          RUN_MODE: ${{ steps.mode.outputs.mode }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DCA_SHARES: ${{ github.event.inputs.dca_shares }}   # ← 추가
          DCA_PRICE: ${{ github.event.inputs.dca_price }}     # ← 추가
        run: python hood_monitor.py

      - name: Commit state
        run: |
          git config user.name "hood-monitor[bot]"
          git config user.email "bot@hood-monitor"
          git add state.json weekly_state.json beta_cache.json app_rank_cache.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "📊 state update [${{ steps.mode.outputs.mode }}] $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase origin main || true
          git push || echo "Push failed — state will be updated next run"
