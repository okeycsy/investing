name: $HOOD Slack Monitor

on:
  schedule:
    # 미국 장중 (ET 9:00~16:30 = UTC 13:00~20:30)
    # 30분마다 실행, 월~금
    - cron: "0,30 13-20 * * 1-5"
    # 장 마감 직후 한 번 더 (실적/공시 반영)
    - cron: "0 21 * * 1-5"

  # 수동 실행 (테스트용)
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests feedparser

      - name: Run monitor
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python hood_monitor.py
